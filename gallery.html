<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter,sans-serif;background:#f5f5f7}
        body.dark{background:#0a0a0a;color:white}
        .header{background:white;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
        body.dark .header{background:#1a1a2e}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer}
        .back-btn{padding:10px 24px;border-radius:50px;border:1px solid #ddd;background:transparent;cursor:pointer}
        .container{max-width:1200px;margin:40px auto;padding:0 24px}
        .stats{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;border-radius:24px;text-align:center;margin-bottom:40px;color:white}
        .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
        .card{background:white;border-radius:24px;overflow:hidden}
        body.dark .card{background:#1a1a2e}
        .card img{width:100%;height:280px;object-fit:cover}
        .info{padding:16px}
        .prompt{font-size:14px;margin-bottom:8px}
        .date{font-size:12px;opacity:0.6}
    </style>
</head>
<body id="body">
<div class="header"><div class="logo" onclick="location.href='/dashboard'">✨ DreamAI</div><button class="back-btn" onclick="location.href='/dashboard'">← Back</button></div>
<div class="container"><div class="stats" id="stats">📸 Loading...</div><div class="gallery" id="gallery"></div></div>
<script>
async function load(){let r=await fetch('/api/me');if(!(await r.json()).user)location.href='/';let g=await fetch('/api/gallery'),gd=await g.json();let s=await fetch('/api/stats'),sd=await s.json();document.getElementById('stats').innerHTML=`🎨 Total: ${sd.total}`;let container=document.getElementById('gallery');if(gd.images.length===0){container.innerHTML='<div style="text-align:center;padding:80px">No images yet</div>';return}container.innerHTML=gd.images.map(img=>`<div class="card"><img src="${img.image_url}"><div class="info"><div class="prompt">"${img.prompt.substring(0,80)}"</div><div class="date">${new Date(img.date).toLocaleDateString()}</div></div></div>`).join('');let dr=await fetch('/api/me'),dd=await dr.json();if(dd.user&&dd.user.dark_mode==1)document.getElementById('body').classList.add('dark')}
load()
</script>
</body>
</html>
