<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Badges</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter,sans-serif;background:#f5f5f7}
        body.dark{background:#0a0a0a;color:white}
        .header{background:white;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
        body.dark .header{background:#1a1a2e}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer}
        .back-btn{padding:10px 24px;border-radius:50px;border:1px solid #ddd;background:transparent;cursor:pointer}
        .container{max-width:800px;margin:40px auto;padding:0 24px}
        .stats-card{background:white;padding:40px;border-radius:32px;text-align:center;margin-bottom:40px}
        body.dark .stats-card{background:#1a1a2e}
        .stat-number{font-size:72px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent}
        .badge{background:white;padding:20px;border-radius:24px;display:flex;align-items:center;gap:20px;margin-bottom:16px}
        body.dark .badge{background:#1a1a2e}
        .badge.locked{opacity:0.5}
        .icon{font-size:48px;width:70px}
        .info{flex:1}
        .title{font-weight:700}
        .desc{font-size:13px;opacity:0.7}
    </style>
</head>
<body id="body">
<div class="header"><div class="logo" onclick="location.href='/dashboard'">✨ DreamAI</div><button class="back-btn" onclick="location.href='/dashboard'">← Back</button></div>
<div class="container"><div class="stats-card"><div class="stat-number" id="total">0</div><p>Total Artworks</p></div><div id="badges"></div></div>
<script>
const badges=[{icon:"🎨",title:"First Creation",desc:"Create 1 image",need:1},{icon:"🔥",title:"Rising Artist",desc:"Create 5 images",need:5},{icon:"⭐",title:"Art Star",desc:"Create 10 images",need:10},{icon:"🏆",title:"Master",desc:"Create 25 images",need:25},{icon:"👑",title:"Legend",desc:"Create 50 images",need:50}]
async function load(){let r=await fetch('/api/me');if(!(await r.json()).user)location.href='/';let s=await fetch('/api/stats'),sd=await s.json();document.getElementById('total').innerText=sd.total;let container=document.getElementById('badges');container.innerHTML=badges.map(b=>{let unlocked=sd.total>=b.need;return`<div class="badge ${unlocked?'':'locked'}"><div class="icon">${b.icon}</div><div class="info"><div class="title">${b.title}</div><div class="desc">${b.desc}</div></div><div>${unlocked?'✅':'🔒'}</div></div>`}).join('');let dr=await fetch('/api/me'),dd=await dr.json();if(dd.user&&dd.user.dark_mode==1)document.getElementById('body').classList.add('dark')}
load()
</script>
</body>
</html>
