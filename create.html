<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter,sans-serif;background:#f5f5f7}
        body.dark{background:#0a0a0a;color:white}
        .header{background:white;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
        body.dark .header{background:#1a1a2e}
        .logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer}
        .back-btn{padding:10px 24px;border-radius:50px;border:1px solid #ddd;background:transparent;cursor:pointer}
        .container{max-width:800px;margin:40px auto;padding:0 24px}
        .card{background:white;padding:48px;border-radius:32px}
        body.dark .card{background:#1a1a2e}
        .points-info{background:#fef3c7;padding:16px;border-radius:20px;margin-bottom:24px}
        textarea{width:100%;padding:16px;border:2px solid #ddd;border-radius:20px;margin-bottom:20px}
        .examples{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
        .chip{padding:8px 16px;border-radius:50px;background:#e5e7eb;cursor:pointer}
        button{width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:60px;font-size:18px;font-weight:700;cursor:pointer}
        .loading{text-align:center;padding:40px;display:none}
        .spinner{width:50px;height:50px;border:4px solid #e5e7eb;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .result{margin-top:30px;text-align:center;display:none}
        .result img{max-width:100%;border-radius:24px}
        .save-btn{margin-top:20px;background:#10b981}
    </style>
</head>
<body id="body">
<div class="header"><div class="logo" onclick="location.href='/dashboard'">✨ DreamAI</div><button class="back-btn" onclick="location.href='/dashboard'">← Back</button></div>
<div class="container"><div class="card"><div class="points-info" id="pointsInfo">⭐ Loading...</div><textarea id="prompt" rows="4" placeholder="Describe your image..."></textarea><div class="examples"><div class="chip" onclick="setPrompt('sunset over mountains')">🌄 Sunset</div><div class="chip" onclick="setPrompt('cyberpunk city neon lights')">🌃 Cyberpunk</div></div><button onclick="generate()">🎨 Generate (1 point)</button><div class="loading" id="loading"><div class="spinner"></div><p>AI creating...</p></div><div class="result" id="result"><img id="image" src=""><button class="save-btn" onclick="save()">💾 Save to Gallery</button></div></div></div>
<script>
let currentUrl='',points=0
async function load(){let r=await fetch('/api/me');if(!(await r.json()).user)location.href='/';let p=await fetch('/api/points'),pd=await p.json();points=pd.points;document.getElementById('pointsInfo').innerHTML=`⭐ Your points: ${points}`;let dr=await fetch('/api/me'),dd=await dr.json();if(dd.user&&dd.user.dark_mode==1)document.getElementById('body').classList.add('dark')}
function setPrompt(t){document.getElementById('prompt').value=t}
async function generate(){let p=document.getElementById('prompt').value.trim();if(!p){alert('Enter prompt');return}if(points<1){alert('Not enough points');return}document.getElementById('loading').style.display='block';document.getElementById('result').style.display='none';let r=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p})});let d=await r.json();if(d.success){currentUrl=d.image_url;document.getElementById('image').src=currentUrl;document.getElementById('loading').style.display='none';document.getElementById('result').style.display='block';let p2=await fetch('/api/points'),pd2=await p2.json();points=pd2.points;document.getElementById('pointsInfo').innerHTML=`⭐ Your points: ${points}`}else{document.getElementById('loading').style.display='none';alert(d.error)}}
async function save(){alert('Saved!');setTimeout(()=>{location.href='/gallery'},1000)}
load()
</script>
</body>
</html>
